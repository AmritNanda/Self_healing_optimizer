apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: memory-stress-test
  namespace: chaos-testing
spec:
  mode: one
  selector:
    namespaces:
      - applications
    labelSelectors:
      app: cartservice
  stressors:
    memory:
      workers: 2
      size: "256MB"
  duration: "60s"
